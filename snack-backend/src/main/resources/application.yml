# 服务器配置
server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: snack-sales-system

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/snack_sales_system?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 20MB
      file-size-threshold: 0

# MyBatis-Plus配置
mybatis-plus:
  configuration:
    # 驼峰命名转换
    map-underscore-to-camel-case: true
    # 日志输出
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      # 主键类型
      id-type: auto
      # 逻辑删除字段
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  # mapper.xml位置
  mapper-locations: classpath*:/mapper/**/*.xml

# JWT配置
jwt:
  secret: snackSalesSystemSecretKeyForJWTToken2024
  expiration: 604800000  # 7天(毫秒)
  header: Authorization
  prefix: Bearer

# 文件上传配置
file:
  upload:
    path: uploads/
    # 允许的文件类型
    allowed-types: jpg,jpeg,png,gif,bmp,webp
